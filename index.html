<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE::CHECK — Ambient Mood Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#ff2d78;--purple:#a020f0;--cyan:#00eeff;--yellow:#ffe600;--bg:#07000f;--text:#e8deff;--muted:#7a6a9a;--border:rgba(160,32,240,0.3)}
html,body{height:100%;overflow:hidden;background:#000;color:var(--text);font-family:'Rajdhani',sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;cursor:crosshair}
.hud{position:fixed;top:20px;left:20px;z-index:10;pointer-events:none}
.hud-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:2px}
.hud-name{font-family:'Orbitron',sans-serif;font-size:26px;letter-spacing:3px;color:#fff;text-shadow:0 0 20px currentColor}
.controls{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:16px 20px;
background:linear-gradient(transparent,rgba(0,0,0,0.8) 30%);display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
.vibe-btn{
font-family:'Orbitron',sans-serif;font-size:10px;padding:8px 16px;letter-spacing:1px;text-transform:uppercase;
border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:rgba(255,255,255,0.5);
cursor:pointer;border-radius:4px;transition:all .2s;backdrop-filter:blur(4px)}
.vibe-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.8)}
.vibe-btn.active{color:#fff;border-color:currentColor;text-shadow:0 0 10px currentColor;box-shadow:0 0 15px currentColor inset,0 0 20px rgba(0,0,0,0.5)}
.vibe-btn .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
.sep{width:1px;height:24px;background:rgba(255,255,255,0.1);margin:0 4px}
.ctrl{display:flex;align-items:center;gap:6px}
.ctrl label{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase}
input[type="range"]{-webkit-appearance:none;width:80px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
input[type="range"]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.footer{position:fixed;bottom:56px;width:100%;text-align:center;z-index:5;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.15);pointer-events:none}
.click-hint{position:fixed;top:20px;right:20px;z-index:10;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.25);pointer-events:none}
@media(max-width:600px){
.controls{padding:10px;gap:6px}
.vibe-btn{font-size:9px;padding:6px 10px}
input[type="range"]{width:60px}
}
</style>
</head>
<body>
<canvas id="vc"></canvas>
<div class="hud">
<div class="hud-label">Current vibe</div>
<div class="hud-name" id="hud-name">Grinding</div>
</div>
<div class="click-hint">Click anywhere to add energy</div>
<div class="footer">VIBE::CHECK v1.0 // NexusFang-Tech</div>
<div class="controls">
<button class="vibe-btn active" data-vibe="grinding" style="color:#ff2d78"><span class="dot" style="background:#ff2d78"></span>Grinding</button>
<button class="vibe-btn" data-vibe="chilling" style="color:#00eeff"><span class="dot" style="background:#00eeff"></span>Chilling</button>
<button class="vibe-btn" data-vibe="tilted" style="color:#ff4400"><span class="dot" style="background:#ff4400"></span>Tilted</button>
<button class="vibe-btn" data-vibe="cracked" style="color:#ffe600"><span class="dot" style="background:#ffe600"></span>Cracked</button>
<button class="vibe-btn" data-vibe="flow" style="color:#a020f0"><span class="dot" style="background:#a020f0"></span>Flow State</button>
<button class="vibe-btn" data-vibe="cozy" style="color:#ff9944"><span class="dot" style="background:#ff9944"></span>Cozy</button>
<div class="sep"></div>
<div class="ctrl"><label>Spd</label><input type="range" min="1" max="100" value="50" id="vc-speed" /></div>
<div class="ctrl"><label>Qty</label><input type="range" min="20" max="400" value="120" id="vc-density" /></div>
</div>

<script>
const canvas=document.getElementById('vc'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',()=>{resize();initParticles()});

const vibes={
grinding:{name:'Grinding',bg:['#0a0014','#1a0030','#0d001a'],colors:['#ff2d78','#ff5599','#a020f0','#ff1155','#cc0066'],style:'streak',speed:1.5,pulse:true,dir:'up'},
chilling:{name:'Chilling',bg:['#001520','#002030','#001018'],colors:['#00eeff','#0088cc','#005588','#00bbdd','#44ddff'],style:'float',speed:0.3,pulse:false,dir:'drift'},
tilted:{name:'Tilted',bg:['#1a0000','#200800','#150000'],colors:['#ff4400','#ff2200','#ff6600','#cc3300','#ff0000'],style:'shake',speed:2.0,pulse:true,dir:'chaos'},
cracked:{name:'Cracked',bg:['#0a0a00','#1a1500','#0d0d00'],colors:['#ffe600','#ffcc00','#ff9900','#ffff44','#ffaa00'],style:'burst',speed:1.8,pulse:true,dir:'radial'},
flow:{name:'Flow State',bg:['#0a0020','#100030','#08001a'],colors:['#a020f0','#8844ff','#6622cc','#bb55ff','#cc77ff'],style:'wave',speed:0.7,pulse:false,dir:'orbit'},
cozy:{name:'Cozy',bg:['#0f0800','#1a0e00','#0a0500'],colors:['#ff9944','#ffaa55','#cc7722','#ffbb66','#ee8833'],style:'ember',speed:0.4,pulse:false,dir:'up'}
};
let cur='grinding',particles=[],frame=0,speedMul=1,density=120,bursts=[];

class P{
constructor(){this.reset()}
reset(){const v=vibes[cur];this.x=Math.random()*W;this.y=Math.random()*H;this.sz=1+Math.random()*3;this.col=v.colors[Math.floor(Math.random()*v.colors.length)];this.a=0.2+Math.random()*0.6;this.vx=(Math.random()-0.5)*v.speed;this.vy=(Math.random()-0.5)*v.speed;this.life=1;this.decay=0.0005+Math.random()*0.002;this.ang=Math.random()*Math.PI*2;this.oR=30+Math.random()*100;this.oS=0.005+Math.random()*0.02;this.ox=this.x;this.oy=this.y}
update(){const v=vibes[cur],s=v.speed*speedMul;
switch(v.dir){case'up':this.vy=-s*(0.3+this.sz*0.2);this.vx+=(Math.random()-0.5)*0.1;break;case'drift':this.vx+=Math.sin(frame*0.01+this.y*0.01)*0.02*s;this.vy+=Math.cos(frame*0.008+this.x*0.01)*0.02*s;this.vx*=0.99;this.vy*=0.99;break;case'chaos':this.vx+=(Math.random()-0.5)*s*0.8;this.vy+=(Math.random()-0.5)*s*0.8;this.vx*=0.95;this.vy*=0.95;break;case'radial':const dx=this.x-W/2,dy=this.y-H/2,d=Math.sqrt(dx*dx+dy*dy)||1;this.vx=(dx/d)*s*0.5;this.vy=(dy/d)*s*0.5;break;case'orbit':this.ang+=this.oS*s;this.x=this.ox+Math.cos(this.ang)*this.oR;this.y=this.oy+Math.sin(this.ang)*this.oR*0.6;return}
this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(this.x<-20||this.x>W+20||this.y<-20||this.y>H+20||this.life<=0)this.reset()}
draw(){const v=vibes[cur],al=this.a*this.life;ctx.globalAlpha=al;ctx.fillStyle=this.col;
if(v.style==='streak'){ctx.save();const an=Math.atan2(this.vy,this.vx);ctx.translate(this.x,this.y);ctx.rotate(an);ctx.fillRect(-this.sz*3,-this.sz*0.4,this.sz*6,this.sz*0.8);ctx.restore()}
else if(v.style==='ember'){ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=al*0.3;ctx.beginPath();ctx.arc(this.x,this.y,this.sz*3,0,Math.PI*2);ctx.fill()}
else if(v.style==='wave'){ctx.beginPath();ctx.arc(this.x,this.y,this.sz*1.5,0,Math.PI*2);ctx.fill()}
else{ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fill()}
ctx.globalAlpha=1}}

function initParticles(){particles=[];for(let i=0;i<density;i++)particles.push(new P)}
initParticles();

function drawBg(){const v=vibes[cur],bg=v.bg;const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);g.addColorStop(0,bg[1]);g.addColorStop(0.6,bg[0]);g.addColorStop(1,bg[2]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
if(v.pulse){const pa=0.03+Math.sin(frame*0.03)*0.02;const pg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.4);pg.addColorStop(0,v.colors[0]);pg.addColorStop(1,'transparent');ctx.globalAlpha=Math.max(0,pa);ctx.fillStyle=pg;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}}

function doBursts(){for(let i=bursts.length-1;i>=0;i--){const b=bursts[i];b.life-=0.02;if(b.life<=0){bursts.splice(i,1);continue}
const v=vibes[cur];ctx.globalAlpha=b.life*0.4;const pg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*(1-b.life+0.5));pg.addColorStop(0,v.colors[0]);pg.addColorStop(1,'transparent');ctx.fillStyle=pg;ctx.beginPath();ctx.arc(b.x,b.y,b.r*(1-b.life+0.5),0,Math.PI*2);ctx.fill();
for(const p of b.ps){p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.03;if(p.life>0){ctx.globalAlpha=p.life*0.8;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill()}}
ctx.globalAlpha=1}}

canvas.addEventListener('click',e=>{const v=vibes[cur],ps=[];for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*5;ps.push({x:e.clientX,y:e.clientY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,sz:1+Math.random()*2.5,col:v.colors[Math.floor(Math.random()*v.colors.length)],life:1})}
bursts.push({x:e.clientX,y:e.clientY,r:80+Math.random()*60,life:1,ps})});

function render(){frame++;ctx.save();drawBg();for(const p of particles){p.update();p.draw()}doBursts();ctx.restore();while(particles.length<density)particles.push(new P);while(particles.length>density)particles.pop();requestAnimationFrame(render)}

document.querySelectorAll('.vibe-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.vibe-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');cur=btn.dataset.vibe;document.getElementById('hud-name').textContent=vibes[cur].name;document.getElementById('hud-name').style.textShadow=`0 0 20px ${vibes[cur].colors[0]}`;initParticles()})});
document.getElementById('vc-speed').addEventListener('input',e=>{speedMul=parseInt(e.target.value)/50});
document.getElementById('vc-density').addEventListener('input',e=>{density=parseInt(e.target.value)});
document.getElementById('hud-name').style.textShadow=`0 0 20px ${vibes[cur].colors[0]}`;
render();
</script>
</body>
</html>
